<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080, initial-scale=1.0">
    <title>Reprodutor Smart TV Philco</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar para Canais -->
        <div class="sidebar">
            <header>
                <h1>Smart TV <span>App</span></h1>
            </header>
            
            <div class="library-section">
                <div class="library-header">
                    <h2>Canais</h2>
                    <button class="btn-add-mini selectable" id="btn-add" title="Adicionar">+</button>
                </div>
                <div id="links-list" class="links-vertical-list">
                    <!-- Links serão inseridos via JS -->
                </div>
            </div>
        </div>

        <!-- Área Principal com Vídeo -->
        <div class="main-content">
            <div class="video-container" id="video-wrapper" data-status="idle">
                <div class="video-overlay" id="video-spinner">Carregando...</div>
                <video id="main-player"></video>
                
                <!-- Overlay de Erro Customizado -->
                <div id="error-banner" class="hidden"></div>

                <div class="player-controls" id="custom-controls">
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="progress-bar"></div>
                    </div>
                    <div class="controls-buttons">
                        <button class="control-btn selectable" id="btn-prev-channel" title="Canal Anterior">
                            <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z" fill="currentColor"/></svg>
                        </button>
                        <button class="control-btn selectable" id="btn-play-pause" title="Play/Pause">
                            <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>
                            <svg id="icon-pause" class="hidden" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" fill="currentColor"/></svg>
                        </button>
                        <button class="control-btn selectable" id="btn-next-channel" title="Próximo Canal">
                            <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z" fill="currentColor"/></svg>
                        </button>
                    </div>
                    <div class="time-info">
                        <span id="current-time">00:00</span> / <span id="duration">00:00</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal para Adicionar Links -->
        <div id="modal-add" class="modal hidden">
            <div class="modal-content">
                <h3>Novo Canal / Lista</h3>
                <input type="text" id="input-link" placeholder="Cole o link .mp4, .m3u8, .ts ou lista .m3u...">
                <div class="modal-buttons">
                    <button id="btn-save" class="selectable">Salvar Link</button>
                    <button id="btn-cancel" class="selectable">Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/navigation.js"></script>
    <script src="js/player.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
